name: AI Code Review
on:
  pull_request:
    types: [opened, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  review-correctness:
    uses: ./.github/workflows/reviewer-correctness.lock.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      aw_context: '{"reviewer":"correctness"}'
    secrets: inherit

  review-maintainability:
    uses: ./.github/workflows/reviewer-maintainability.lock.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      aw_context: '{"reviewer":"maintainability"}'
    secrets: inherit

  review-resilience:
    uses: ./.github/workflows/reviewer-resilience.lock.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      aw_context: '{"reviewer":"resilience"}'
    secrets: inherit
