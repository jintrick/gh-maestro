name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  review:
    uses: jintrick/gh-maestro/.github/workflows/review-entry.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
