name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review-correctness:
    uses: jintrick/gh-maestro/.github/workflows/reviewer-correctness.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  review-maintainability:
    uses: jintrick/gh-maestro/.github/workflows/reviewer-maintainability.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  review-resilience:
    uses: jintrick/gh-maestro/.github/workflows/reviewer-resilience.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
