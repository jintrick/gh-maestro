name: AI Code Review Entry
on:
  workflow_call:
    inputs:
      pr_number:
        description: Review対象のPR番号
        required: true
        type: number
    secrets:
      DEEPSEEK_API_KEY:
        required: false
      GH_AW_GITHUB_MCP_SERVER_TOKEN:
        required: false
      GH_AW_GITHUB_TOKEN:
        required: false

jobs:
  review-correctness:
    uses: ./.github/workflows/reviewer-correctness.yml
    with:
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit

  review-maintainability:
    uses: ./.github/workflows/reviewer-maintainability.yml
    with:
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit

  review-resilience:
    uses: ./.github/workflows/reviewer-resilience.yml
    with:
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit
