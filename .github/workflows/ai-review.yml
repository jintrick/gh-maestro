name: AI Code Review
on:
  pull_request:
    types: [opened, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  review-correctness:
    uses: ./.github/workflows/reviewer-correctness.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  review-maintainability:
    uses: ./.github/workflows/reviewer-maintainability.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  review-resilience:
    uses: ./.github/workflows/reviewer-resilience.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
