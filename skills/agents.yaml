agents:
  claude:
    skill_files_install_destination_directory: ~/.claude/skills
    skill_markdown_template_placeholder_substitutions:
      POLL_INTERVAL_SECONDS: 30
      PR_DETECTION_MECHANISM: |
        以下を順番に実行する：

        1. 以下のスクリプト全体を1つのBashコマンドとして `run_in_background: true` で実行する。

        ```sh
        PR=""
        until [ -n "$PR" ]; do
          # 1. ブランチ名パターンで検索（issue-<N>-* 形式のブランチ）
          PR=$(gh pr list --repo $REPO --search "head:issue-${ISSUE}" --state open --json number -q '.[0].number' 2>/dev/null)
          # 2. フォールバック: PR本文に "#<N>" を含むPRを検索
          [ -n "$PR" ] || PR=$(gh pr list --repo $REPO --state open --json number,body \
            -q ".[] | select(.body | strings | contains(\"#${ISSUE}\")) | .number" 2>/dev/null | head -1)
          [ -n "$PR" ] || sleep {{POLL_INTERVAL_SECONDS}}
        done
        echo "PR_DETECTED:$PR"
        ```

        2. **直ちにMonitorツールを呼び出し**、上記バックグラウンドプロセスを監視する。他のツールを呼んではならない。

        3. `PR_DETECTED:<PR番号>` を受け取ったらPR番号を記録してレビュー監視に移行する。
      POLL_MECHANISM: |
        以下を順番に実行する：

        1. 以下のスクリプト全体を1つのBashコマンドとして `run_in_background: true` で実行する。このスクリプトはマージされるまで永続的に動き続ける。

        ```sh
        STATE_FILE="$WORKSPACE/.gh-maestro/poll-state-$PR"
        touch "$STATE_FILE"
        INTERVAL={{POLL_INTERVAL_SECONDS}}
        MAX_INTERVAL=300
        while true; do
          # マージ検出
          STATE=$(gh pr view $PR --repo $REPO --json state -q '.state' 2>/dev/null)
          if [ "$STATE" = "MERGED" ]; then echo "PR_MERGED:$PR"; exit 0; fi

          PREV_COUNT=$(wc -l < "$STATE_FILE" 2>/dev/null || echo 0)

          # インラインのレビューコメントを検出
          while IFS= read -r line; do
            ID=$(echo "$line" | cut -d'|' -f1)
            if ! grep -qxF "$ID" "$STATE_FILE"; then
              echo "$ID" >> "$STATE_FILE"
              echo "REVIEW_COMMENT:$(echo "$line" | cut -d'|' -f2-)"
            fi
          done < <(gh api "/repos/$REPO/pulls/$PR/comments" --paginate -q '.[] | "\(.id)|\(.path):\(.original_line // "?")|\(.user.login):\(.body)"' 2>/dev/null)

          # PR全体コメントを検出
          while IFS= read -r line; do
            ID=$(echo "$line" | cut -d'|' -f1)
            if ! grep -qxF "$ID" "$STATE_FILE"; then
              echo "$ID" >> "$STATE_FILE"
              echo "PR_COMMENT:$(echo "$line" | cut -d'|' -f2-)"
            fi
          done < <(gh pr view $PR --repo $REPO --json comments -q '.comments[] | "\(.id)|\(.author.login):\(.body)"' 2>/dev/null)

          CURR_COUNT=$(wc -l < "$STATE_FILE" 2>/dev/null || echo 0)
          if [ "$CURR_COUNT" -gt "$PREV_COUNT" ]; then
            INTERVAL={{POLL_INTERVAL_SECONDS}}
          else
            INTERVAL=$(( INTERVAL * 3 / 2 ))
            [ "$INTERVAL" -gt "$MAX_INTERVAL" ] && INTERVAL=$MAX_INTERVAL
          fi
          sleep "$INTERVAL"
        done
        ```

        2. **直ちにMonitorツールを呼び出し**、上記バックグラウンドプロセスを監視する。他のツールを呼んではならない。

        3. Monitorから届く通知を処理する。`PR_MERGED` を受け取るまでこのループを続ける：
           - `REVIEW_COMMENT:<path>:<line>:<user>:<body>` → コメントトリアージを実行する。**完了後は直ちにMonitorに戻る**
           - `PR_COMMENT:<user>:<body>` → 同様にトリアージする。**完了後は直ちにMonitorに戻る**
           - `PR_MERGED:<PR番号>` → マージ完了。自律的に次のフローへ進む（ループ終了）
  agy:
    skill_files_install_destination_directory: ~/.gemini/antigravity-cli/skills
    skill_markdown_template_placeholder_substitutions:
      POLL_INTERVAL_SECONDS: 30
      PR_DETECTION_MECHANISM: |
        `invoke_subagent` でポーリングサブエージェントを起動し、完了時に `send_message` で親へ通知させる。

        サブエージェントへの指示：「以下を {{POLL_INTERVAL_SECONDS}}秒おきに繰り返し、PR番号が取得できたら `send_message` で "PR_DETECTED:<PR番号>" を親に送信して終了する。
        1. まずブランチ名パターンで検索: `gh pr list --repo $REPO --search "head:issue-${ISSUE}" --state open --json number -q '.[0].number'`
        2. 見つからなければ本文検索: `gh pr list --repo $REPO --state open --json number,body -q '.[] | select(.body | strings | contains("#$ISSUE")) | .number'`
        注意: `--search "Closes #$ISSUE"` はGitHubの非同期インデックスに依存するため使わないこと。」
      POLL_MECHANISM: |
        `invoke_subagent` でポーリングサブエージェントを起動し、完了時に `send_message` で親へ通知させる。このサブエージェントはマージされるまで永続的に実行する。

        サブエージェントへの指示：
        「以下のループを実行する。STATE_FILEとして `$WORKSPACE/.gh-maestro/poll-state-$PR` を使用し、既知のコメントIDを管理する。
        1. `gh pr view $PR --repo $REPO --json state -q '.state'` を {{POLL_INTERVAL_SECONDS}}秒おきに実行する
        2. stateが MERGED になったら `send_message` で "PR_MERGED:$PR" を親に送り、終了する
        3. `gh api "/repos/$REPO/pulls/$PR/comments" --paginate` でインラインレビューコメントを取得し、新規のものがあれば `send_message` で "REVIEW_COMMENT:<path>:<line>:<user>:<body>" を親に送信し、コメントIDをSTATE_FILEに記録する
        4. `gh pr view $PR --repo $REPO --json comments` でPR全体コメントを取得し、同様に新規分を通知する
        5. 新しいコメントがなければポーリング間隔を1.5倍に伸ばす（最大300秒）。あればリセットする
        ※ このサブエージェントはマージが検出されるまで終了しない」
