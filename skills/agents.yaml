agents:
  claude:
    skill_files_install_destination_directory: ~/.claude/skills
    skill_markdown_template_placeholder_substitutions:
      POLL_INTERVAL_SECONDS: 30
      PR_DETECTION_MECHANISM: |
        Monitorツールを呼び出し、`command` に `node "{{SCRIPTS_PATH}}/poll-pr.js" $ISSUE` を直接指定して起動する。`persistent: true` を設定すること。他のツールを呼んではならない。

        poll-pr.js はPRを検出すると同時にレビュアーを起動し、以下を出力する：
        - `PR_DETECTED:<PR番号>` → PR番号を記録する
        - `REVIEW_STARTED:<PR番号>` → レビュアーが起動した（記録する）
        - `REVIEW_ALREADY_RUNNING:<PR番号>` → 既にレビュアーが稼働中（多重起動は防がれた）

        両方を受け取ったらレビュー監視に移行する。レビュアーが起動しなかった場合（`REVIEW_STARTED`/`REVIEW_ALREADY_RUNNING` のどちらも来ない場合）は「レビュアーの手動起動」に従って自分で起動する。
      POLL_MECHANISM: |
        Monitorツールを呼び出し、`command` に `node "{{SCRIPTS_PATH}}/poll-reviews.js" $PR $WORKSPACE` を直接指定して起動する。`persistent: true` を設定すること。他のツールを呼んではならない。

        Monitorから届く通知を処理する。`PR_MERGED` を受け取るまでこのループを続ける：
        - `REVIEW_COMMENT:...` → コメントトリアージを実行する。**完了後は直ちにMonitorに戻る**
        - `PR_COMMENT:...` → 同様にトリアージする。**完了後は直ちにMonitorに戻る**
        - `PR_REVIEW:<user>:<state>:<body>` → 正式レビュー提出（Submit reviewボタン経由）。stateがAPPROVEDなら人間にマージ許可のシグナルとして伝える。CHANGES_REQUESTEDならbodyをトリアージしてコーダーにフィードバックする。COMMENTEDならPR_COMMENTと同様にトリアージする。**完了後は直ちにMonitorに戻る**
        - `PR_MERGED:<PR番号>` → マージ完了。自律的に次のフローへ進む（ループ終了）
  agy:
    skill_files_install_destination_directory: ~/.gemini/antigravity-cli/skills
    skill_markdown_template_placeholder_substitutions:
      POLL_INTERVAL_SECONDS: 30
      PR_DETECTION_MECHANISM: |
        `invoke_subagent` でポーリングサブエージェントを起動し、完了時に `send_message` で親へ通知させる。

        サブエージェントへの指示：「以下を {{POLL_INTERVAL_SECONDS}}秒おきに繰り返し、PR番号が取得できたら下記3を実行してから `send_message` で "PR_DETECTED:<PR番号>" と start-review.js の出力（"REVIEW_STARTED:<PR番号>" 等）を親に送信して終了する。
        1. まずブランチ名パターンで検索: `gh pr list --repo $REPO --search "head:issue-${ISSUE}" --state open --json number -q '.[0].number'`
        2. 見つからなければ本文検索: `gh pr list --repo $REPO --state open --json number,body -q '.[] | select(.body | strings | contains("#$ISSUE")) | .number'`
        3. PR番号が取れたらレビュアーを起動する: `node "{{SCRIPTS_PATH}}/start-review.js" <PR番号> $REPO $WORKSPACE`
        注意: `--search "Closes #$ISSUE"` はGitHubの非同期インデックスに依存するため使わないこと。」
      POLL_MECHANISM: |
        `invoke_subagent` でポーリングサブエージェントを起動し、完了時に `send_message` で親へ通知させる。このサブエージェントはマージされるまで永続的に実行する。

        サブエージェントへの指示：
        「以下のループを実行する。STATE_FILEとして `$WORKSPACE/.gh-maestro/poll-state-$PR` を使用し、既知のコメントIDを管理する。
        1. `gh pr view $PR --repo $REPO --json state -q '.state'` を {{POLL_INTERVAL_SECONDS}}秒おきに実行する
        2. stateが MERGED になったら `send_message` で "PR_MERGED:$PR" を親に送り、終了する
        3. `gh api "/repos/$REPO/pulls/$PR/comments" --paginate` でインラインレビューコメントを取得し、新規のものがあれば `send_message` で "REVIEW_COMMENT:<path>:<line>:<user>:<body>" を親に送信し、コメントIDをSTATE_FILEに記録する
        4. `gh pr view $PR --repo $REPO --json comments` でPR全体コメントを取得し、同様に新規分を通知する
        5. `gh api "/repos/$REPO/pulls/$PR/reviews" --paginate` で正式レビュー提出を取得し、新規のものがあれば `send_message` で "PR_REVIEW:<user>:<state>:<body>" を親に送信する（state=APPROVED/CHANGES_REQUESTEDはbody空でも通知。state=COMMENTEDはbodyが空でない場合のみ通知）
        6. 新しいコメントがなければポーリング間隔を1.5倍に伸ばす（最大300秒）。あればリセットする
        ※ このサブエージェントはマージが検出されるまで終了しない」

        親として届く通知の処理：
        - `PR_REVIEW:<user>:APPROVED:<body>` → 人間にマージ許可シグナルとして提示する
        - `PR_REVIEW:<user>:CHANGES_REQUESTED:<body>` → bodyをトリアージしてコーダーにフィードバックする
        - `PR_REVIEW:<user>:COMMENTED:<body>` → PR_COMMENTと同様にトリアージする
